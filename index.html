<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Clash | Jebra vs Memo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        var cacheBuster = new URLSearchParams(window.location.search).get('v') || '1.0';
        document.write('<link rel="stylesheet" href="style.css?v=' + cacheBuster + '">');
    </script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Habit Clash ⚔️</h1>
            <p>Jebra vs Memo - The Ultimate Showdown</p>
            
            <div class="settings-dropdown">
                <button class="settings-btn">⚙️ Settings</button>
                <div class="dropdown-content">
                    <a href="https://jsonbin.io/app/dashboard" target="_blank">☁️ Database Dashboard</a>
                    <button id="clear-cache-btn">🔄 Clear Cache & Reload</button>
                </div>
            </div>
        </header>

        <nav>
            <button class="nav-btn active" data-target="tracker">Daily Tracker</button>
            <button class="nav-btn" data-target="last-days">Last Days</button>
            <button class="nav-btn" data-target="stats">Statistics</button>
            <button class="nav-btn" data-target="leaderboard">Leaderboard</button>
        </nav>

        <main>
            <!-- Daily Tracker Section -->
            <section id="tracker" class="tab-content active">
                <div class="actions" style="display: none;">
                    <!-- <button id="add-day-btn" class="btn-primary">Add Next Day</button> -->
                </div>
                
                <div class="quick-score glass-panel" style="display: flex; justify-content: space-around; margin-bottom: 2rem; padding: 1.5rem; text-align: center;">
                    <div>
                        <h3 style="color: var(--jebra-color); margin-bottom: 0.5rem; font-size: 1.2rem;">Jebra</h3>
                        <div style="font-size: 2.5rem; font-weight: 800;" id="jebra-quick-score">0</div>
                    </div>
                    <div>
                        <h3 style="color: var(--memo-color); margin-bottom: 0.5rem; font-size: 1.2rem;">Memo</h3>
                        <div style="font-size: 2.5rem; font-weight: 800;" id="memo-quick-score">0</div>
                    </div>
                </div>
                
                <!-- Today Section -->
                <div id="today-container"></div>
                
                <hr id="tracker-divider" style="margin: 2rem 0; border: none; border-top: 1px dashed rgba(255,255,255,0.2); display: none;">
                
                <!-- Future Days Section -->
                <div id="tracker-list"></div>
            </section>

            <!-- Last Days Section -->
            <section id="last-days" class="tab-content">
                <h3 style="margin-bottom: 1.5rem; color: var(--text-muted); border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem; text-align: left;">Past Days</h3>
                <div id="last-days-list"></div>
            </section>

            <!-- Statistics Section -->
            <section id="stats" class="tab-content">
                <div class="stats-grid">
                    <div class="stat-card glass-panel jebra-card">
                        <h3>Jebra's Stats</h3>
                        <div class="stat-row"><span>Total Points</span> <strong id="jebra-total">0</strong></div>
                        <div class="stat-row"><span>Full Days (4/4)</span> <strong id="jebra-full">0</strong></div>
                        <div class="stat-row"><span>Commitment</span> <strong id="jebra-commit">0%</strong></div>
                    </div>
                    <div class="stat-card glass-panel memo-card">
                        <h3>Memo's Stats</h3>
                        <div class="stat-row"><span>Total Points</span> <strong id="memo-total">0</strong></div>
                        <div class="stat-row"><span>Full Days (4/4)</span> <strong id="memo-full">0</strong></div>
                        <div class="stat-row"><span>Commitment</span> <strong id="memo-commit">0%</strong></div>
                    </div>
                </div>
            </section>

            <!-- Leaderboard Section -->
            <section id="leaderboard" class="tab-content">
                <div class="glass-panel">
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Player</th>
                                <th>Total Points</th>
                                <th>Full Days</th>
                                <th>Commitment</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            <!-- Rows generated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script>
        var cacheBuster = new URLSearchParams(window.location.search).get('v') || '1.0';
        document.write('<script src="app.js?v=' + cacheBuster + '"></' + 'script>');
    </script>
</body>
</html>
