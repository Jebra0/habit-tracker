<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Clash | Jebra vs Memo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Habit Clash ⚔️</h1>
            <p>Jebra vs Memo - The Ultimate Showdown</p>
            <a href="https://jsonbin.io/app/dashboard" target="_blank" class="db-link">☁️ Database Dashboard</a>
        </header>

        <nav>
            <button class="nav-btn active" data-target="tracker">Daily Tracker</button>
            <button class="nav-btn" data-target="stats">Statistics</button>
            <button class="nav-btn" data-target="leaderboard">Leaderboard</button>
        </nav>

        <main>
            <!-- Daily Tracker Section -->
            <section id="tracker" class="tab-content active">
                <div class="actions">
                    <button id="add-day-btn" class="btn-primary">Add Next Day</button>
                </div>
                
                <!-- Today Section -->
                <div id="today-container"></div>
                
                <hr id="tracker-divider" style="margin: 2rem 0; border: none; border-top: 1px dashed rgba(255,255,255,0.2); display: none;">
                
                <!-- Current Month Section -->
                <div id="tracker-list"></div>

                <!-- Old Days Section (Past Months) -->
                <div id="old-days-wrapper" style="display: none; margin-top: 3rem;">
                    <h3 style="margin-bottom: 1.5rem; color: var(--text-muted); border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem;">Old Days (Past Months)</h3>
                    <div id="old-days-list"></div>
                </div>
            </section>

            <!-- Statistics Section -->
            <section id="stats" class="tab-content">
                <div class="stats-grid">
                    <div class="stat-card glass-panel jebra-card">
                        <h3>Jebra's Stats</h3>
                        <div class="stat-row"><span>Total Points</span> <strong id="jebra-total">0</strong></div>
                        <div class="stat-row"><span>Full Days (3/3)</span> <strong id="jebra-full">0</strong></div>
                        <div class="stat-row"><span>Commitment</span> <strong id="jebra-commit">0%</strong></div>
                    </div>
                    <div class="stat-card glass-panel memo-card">
                        <h3>Memo's Stats</h3>
                        <div class="stat-row"><span>Total Points</span> <strong id="memo-total">0</strong></div>
                        <div class="stat-row"><span>Full Days (3/3)</span> <strong id="memo-full">0</strong></div>
                        <div class="stat-row"><span>Commitment</span> <strong id="memo-commit">0%</strong></div>
                    </div>
                </div>
            </section>

            <!-- Leaderboard Section -->
            <section id="leaderboard" class="tab-content">
                <div class="glass-panel">
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Player</th>
                                <th>Total Points</th>
                                <th>Full Days</th>
                                <th>Commitment</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            <!-- Rows generated by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
